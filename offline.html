<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bivacchi - Offline</title>
    <meta name="theme-color" content="#ea580c">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
            background:#09090b;color:#fafafa;
            display:flex;flex-direction:column;align-items:center;justify-content:center;
            min-height:100dvh;padding:24px;text-align:center;
        }
        .offline-icon{font-size:64px;margin-bottom:20px}
        h1{font-size:22px;font-weight:600;margin-bottom:8px}
        p{color:#a1a1aa;font-size:14px;line-height:1.5;max-width:300px;margin-bottom:24px}
        .btn-retry{
            padding:12px 32px;border:none;border-radius:10px;
            background:#ea580c;color:white;font-size:14px;font-weight:600;
            cursor:pointer;transition:opacity .2s;
        }
        .btn-retry:active{opacity:.7}
    </style>
</head>
<body>
    <div class="offline-icon">📴</div>
    <h1>Sei offline</h1>
    <p>Controlla la connessione internet e riprova. I dati salvati in cache saranno disponibili al prossimo avvio.</p>
    <button class="btn-retry" onclick="location.reload()">Riprova</button>
</body>
</html>
